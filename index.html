<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB — Le minimalisme qui inspire la confiance</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #020617;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 40px 20px;
      color: #ffffff;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #38bdf8;
      font-size: 42px;
      margin-bottom: 12px;
    }

    .intro {
      color: #cbd5e1;
      font-size: 20px;
      max-width: 600px;
    }

    button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      margin: 20px 0 40px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #0284c7;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #0f172a;
      padding: 24px;
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(14, 165, 233, 0.2);
    }

    .card h2 {
      color: #38bdf8;
      margin-top: 0;
    }

    .card p {
      color: #cbd5e1;
      font-size: 16px;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>IB — Le minimalisme qui inspire la confiance</h1>
    <p class="intro">Création de sites web premium pour artistes, musiciens et créateurs.</p>

    <button>Découvrir IB</button>

    <div class="cards">
      <a class="card" href="#">
        <h2>Portfolio</h2>
        <p>Découvre des artistes près de toi.</p>
      </a>

      <a class="card" href="#">
        <h2>Services</h2>
        <p>Création de sites web, identité visuelle et direction artistique.</p>
      </a>
    </div>
  </div>
</body>
</html>
